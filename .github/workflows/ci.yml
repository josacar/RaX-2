name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Ant
        run: sudo apt-get install -y ant

      - name: Build with Ant
        run: ant -v

      - name: Verify JAR
        run: |
          test -f dist/RaX2.jar
          echo "RaX2.jar exists ($(du -h dist/RaX2.jar | cut -f1))"

      - name: Build Docker image
        run: docker build -t rax2 .
